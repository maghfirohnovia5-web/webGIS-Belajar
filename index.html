<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WebGIS Belajar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map {
      height: 500px;
    }
  </style>
</head>
<body>

  <h2>WebGIS Saya</h2>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // HANYA SEKALI buat map
    var map = L.map('map').setView([-7.2, 110.4], 10);

    // Basemap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // LOAD LAYER 1
    fetch('data/Mangrove_Jawa_Tengah.geojson')
      .then(res => res.json())
      .then(data => {
        L.geoJSON(data, {
          style: { color: "green" }
        }).addTo(map);
      });

    // LOAD LAYER 2
    fetch('data/Garis_Pantai_RTRWP_Jawa_Tengah.geojson')
      .then(res => res.json())
      .then(data => {
        var layer = L.geoJSON(data, {
          style: { color: "red" }
        }).addTo(map);

        map.fitBounds(layer.getBounds());
      });
  </script>

</body>
</html>
