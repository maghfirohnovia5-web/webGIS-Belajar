
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WebGIS Belajar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map {
      height: 500px;
    }
  </style>
</head>
<body>

  <h2>WebGIS Saya</h2>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Inisialisasi peta
    if (typeof map !== 'undefined' && map !== null) {
        map.remove();
    }
    var map = L.map('map').setView([-7.2, 110.4], 10);

    // Basemap OSM
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Load GeoJSON
    fetch('./data/garpan_jateng.geojson')
      .then(function(response) {
        if (!response.ok) {
          throw new Error("File GeoJSON tidak ditemukan!");
        }
        return response.json();
      })
      .then(function(data) {

        // simpan ke variabel (INI YANG PENTING)
        var geojsonLayer = L.geoJSON(data, {
          style: {
            color: "green",
            weight: 2
          }
        }).addTo(map);

        // zoom ke layer
        map.fitBounds(geojsonLayer.getBounds());
      })
      .catch(function(error) {
        console.error("Terjadi error:", error);
        alert("GeoJSON gagal dimuat. Cek console (F12)");
      });

  </script>

</body>
</html>
