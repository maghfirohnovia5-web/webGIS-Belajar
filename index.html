<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WebGIS Belajar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map {
      height: 500px;
    }
  </style>
</head>
<body>

  <h2>WebGIS Saya</h2>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    var map = L.map('map').setView([-7.2, 110.4], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
  </script>

</body>
</html>
<script>
  var map = L.map('map').setView([-7.2, 110.4], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  fetch('data/Mangrove Jawa Tengah.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data).addTo(map);
    });
</script>
<script>
  // Inisialisasi peta
  var map = L.map('map').setView([-7.2, 110.4], 10);

  // Basemap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Ambil GeoJSON
<script>
  var map = L.map('map').setView([-7.2, 110.4], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  fetch('data/Garis Pantai RTRWP Jawa Tengah.geojson')
    .then(res => res.json())
    .then(data => {
      var layer = L.geoJSON(data, {
        style: {
          color: "red",
          weight: 2
        }
      }).addTo(map);

      map.fitBounds(layer.getBounds());
    })
    .catch(err => {
      console.log("ERROR:", err);
    });
</script>
</script>
